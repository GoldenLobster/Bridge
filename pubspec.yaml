name: bridge
description: "Cross-platform device connectivity."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database
  drift: ^2.28.2
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.42

  # File system
  path_provider: ^2.1.5
  path: ^1.9.1

  # Discovery
  bonsoir: ^7.1.1
  flutter_blue_plus: ^2.3.7

  # Background execution
  flutter_background_service: ^5.1.0

  # Notifications
  flutter_local_notifications: ^22.0.0
  local_notifier: ^0.1.6
  notification_listener_service: ^0.3.5

  # Sharing
  share_handler: ^0.0.25
  receive_sharing_intent: ^1.8.1

  # Telephony
  telephony: ^0.2.0
  phone_state: ^3.0.1

  # File picking
  file_picker: ^11.0.2

  # QR codes
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Audio
  record: ^6.2.1
  audioplayers: ^6.7.1

  # Battery
  battery_plus: ^7.0.0

  # Camera
  camera: ^0.12.0+1

  # UUID generation
  uuid: ^4.5.3

  # TLS / certificate generation
  pointycastle: ^3.9.1
  asn1lib: ^1.5.8

  # Permissions
  permission_handler: ^11.3.1

  # App info
  installed_apps: ^2.1.1
  package_info_plus: ^8.3.0

  # Desktop window management
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.5.4
  drift_dev: ^2.28.0
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
